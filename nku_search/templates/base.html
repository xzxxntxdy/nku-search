<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NKU Search{% endblock %}</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">NKU Search</a>
    <nav>
      <a href="/">搜索</a>
      <a href="/history">历史</a>
      {% if user %}
        <span class="user">{{ user.username }}</span>
        <a href="/logout">退出</a>
      {% else %}
        <a href="/login">登录</a>
        <a href="/register">注册</a>
      {% endif %}
    </nav>
  </header>
  <main class="page">
    {% block content %}{% endblock %}
  </main>
  <script src="/static/app.js"></script>
</body>
</html>
